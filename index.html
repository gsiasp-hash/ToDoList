<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>To-Do List</title>
    <link rel="stylesheet" href="./assets/css/styles.css" />
    <script
      src="https://kit.fontawesome.com/17bcd852b8.js"
      crossorigin="anonymous"
    ></script>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB"
      crossorigin="anonymous"
    />
  </head>
  <body>
    <div class="todo border border-1 border-primary shadow">
      <h1>To-Do List</h1>
      <hr />
      <div class="input">
        <h2>Nueva tarea</h2>
        <input
          type="text"
          id="nuevaTarea"
          placeholder="Escribe una nueva tarea"
        />
        <button class="agregarTarea">Agregar</button>
      </div>
      <div class="datos">
        <div class="totales">
          <p>Total de tareas: <span class="totalTareas"></span></p>
          <p>Realizadas: <span class="tareasRealizadas"></span></p>
        </div>
        <div class="lista">
          <div class="encabezadolista">
            <h3 class="fs-5 fw-bold">ID</h3>
            <h3 class="fs-5 fw-bold">Tarea</h3>
          </div>
          <div>
            <ul class="listaDeTareas"></ul>
          </div>
        </div>
      </div>
    </div>
    <script src="./assets/js/script.js"></script>
    <script
      src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.11.8/dist/umd/popper.min.js"
      integrity="sha384-I7E8VVD/ismYTF4hNIPjVp/Zjvgyol6VFvRkX/vR+Vc4jQkC+hVqc2pM8ODewa9r"
      crossorigin="anonymous"
    ></script>
    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.min.js"
      integrity="sha384-G/EV+4j2dNv+tEPo3++6LCgdCROaejBqfUeNjuKAiuXbjrxilcCdDz6ZAVfHWe1Y"
      crossorigin="anonymous"
    ></script>
  </body>
</html>
